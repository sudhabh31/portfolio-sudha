<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Thinner circle, offset slightly up -->
  <circle cx="17" cy="17" r="12" stroke="#1E293B" stroke-width="1.6" fill="none"/>

  <!-- Smoother trendline with a dip then rise — more natural data shape -->
  <polyline
    points="8,22 13,19 17,21 22,13 27,9"
    stroke="#F97316"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Magnifying glass handle -->
  <line x1="26" y1="26" x2="32" y2="32" stroke="#1E293B" stroke-width="2.2" stroke-linecap="round"/>
</svg>
